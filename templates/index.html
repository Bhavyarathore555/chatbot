<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Chatbot</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="main-container">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>💬 Chat History</h2>

        <div id="history-list"></div>

        <button class="clear-btn"
                onclick="clearMemory()">

            Clear History

        </button>

    </div>


    <!-- Main Chat Area -->
    <div class="container">

        <h1>DREAMTEAM Chatbot</h1>

        <!-- PDF Upload -->
        <div class="upload-section">

            <input type="file"
                   id="pdfFile"
                   accept=".pdf">

            <button onclick="uploadPDF()">

                Upload PDF

            </button>

        </div>

        <!-- Chat Box -->
        <div id="chat-box"></div>

        <!-- Input Area -->
        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Type your message..."
            >

            <!-- Voice Button -->
            <button onclick="startVoiceInput()">
                🎤
            </button>

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>


<!-- Voice Overlay -->
<div id="voice-overlay"
     class="voice-overlay">

    <div class="voice-box">

        <div class="mic-animation">
            🎤
        </div>

        <h2>Listening...</h2>

        <p>Please speak now</p>

    </div>

</div>


<script>

const chatBox =
    document.getElementById("chat-box");

const historyList =
    document.getElementById("history-list");

document.getElementById("user-input")
.addEventListener("keypress", function(event) {

    if(event.key === "Enter") {

        sendMessage();
    }
});
// Add Chat Message
function addMessage(message, sender) {

    const div = document.createElement("div");

    div.classList.add("message");

    if(sender === "user") {

        div.classList.add("user-message");

    } else {

        div.classList.add("bot-message");
    }

    div.innerText = message;

    chatBox.appendChild(div);

    chatBox.scrollTop =
        chatBox.scrollHeight;
}


// Add Sidebar History Item
function addHistoryItem(message) {

    const item =
        document.createElement("div");

    item.classList.add("history-item");

    item.innerText = message;

    historyList.prepend(item);
}


// Load Previous Chats
window.onload = async function () {

    try {

        const response =
            await fetch("/get_history");

        const data =
            await response.json();

        data.history.forEach(msg => {

            if(msg.role === "user") {

                addMessage(msg.content, "user");

                addHistoryItem(msg.content);
            }

            if(msg.role === "assistant") {

                addMessage(msg.content, "bot");
            }
        });

    } catch(error) {

        console.log("Could not load history");
    }
};


// Send Message
async function sendMessage() {

    const input =
        document.getElementById("user-input");

    const message = input.value;

    if(message.trim() === "") return;

    addMessage(message, "user");

    addHistoryItem(message);

    input.value = "";

    try {

        const response =
            await fetch("/chat", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                message: message
            })
        });

        const data =
            await response.json();

        addMessage(data.reply, "bot");

    } catch(error) {

        addMessage(
            "Error connecting to server",
            "bot"
        );
    }
}


// Upload PDF
async function uploadPDF() {

    const fileInput =
        document.getElementById("pdfFile");

    const file =
        fileInput.files[0];

    if(!file) {

        alert("Please select PDF");

        return;
    }

    const formData = new FormData();

    formData.append("pdf", file);

    const response =
        await fetch("/upload_pdf", {

        method: "POST",

        body: formData
    });

    const data =
        await response.json();

    alert(data.message);
}


// Voice Input
function startVoiceInput() {

    if (!("webkitSpeechRecognition" in window)) {

        alert("Speech recognition not supported");

        return;
    }

    const overlay =
        document.getElementById("voice-overlay");

    const recognition =
        new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.continuous = false;

    recognition.interimResults = false;

    // Show overlay
    overlay.style.display = "flex";

    // Voice result
    recognition.onresult = function(event) {

        const transcript =
            event.results[0][0].transcript;

        document.getElementById("user-input").value =
            transcript;
    };

    // Hide overlay after speaking
    recognition.onend = function() {

        overlay.style.display = "none";
    };

    // Error handling
    recognition.onerror = function() {

        overlay.style.display = "none";

        alert("Voice recognition error");
    };

    recognition.start();
}


// Clear Chat Memory
async function clearMemory() {

    const response =
        await fetch("/clear_memory", {

        method: "POST"
    });

    const data =
        await response.json();

    alert(data.message);

    location.reload();
}
</script>

</body>
</html>
